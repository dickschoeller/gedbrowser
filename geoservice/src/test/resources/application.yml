gedbrowser:
    home: /var/lib/gedbrowser

logging:
    level:
        org:
            schoellerfamily: DEBUG

spring:
    jackson:
        serialization:
            INDENT_OUTPUT: true
    profiles:
        active: test
    main:
        allow-bean-definition-overriding: true

geoservice:
    keyfile: stub
    backupfile: /var/lib/gedbrowser/geoservice-test-backup.json

management:
    port: 8081
    security:
        enabled: false
    endpoints:
        web:
            exposure:
                include: health,info,load,clear,loadAndFind,mappings,backup,restore
