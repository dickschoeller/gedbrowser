gedbrowser:
    home: src/test/resources

logging:
    level:
        org:
            schoellerfamily: DEBUG

spring:
    jackson:
        serialization:
            INDENT_OUTPUT: true
    profiles:
        active: test
    main:
        allow-bean-definition-overriding: true
    data:
        mongodb:
            host: localhost
            port: 27017

geoservice:
    keyfile: stub
    backupfile: src/test/resources/geoservice-test-backup.json
    loadfile: src/test/resources/geoservice-loadfile.txt

management:
    port: 8081
    security:
        enabled: false
    endpoints:
        web:
            exposure:
                include: health,info,load,clear,loadAndFind,mappings,backup,restore
