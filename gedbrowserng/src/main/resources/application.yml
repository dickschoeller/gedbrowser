gedbrowser:
    home: /var/lib/gedbrowser
    userFile: /var/lib/gedbrowser/userFile.csv

server:
    servlet:
        context-path: /gedbrowserng

spring:
    profiles:
        active: test
    main:
        allow-bean-definition-overriding: true
    jackson:
        serialization:
            INDENT_OUTPUT: true

logging:
    level:
        org:
            schoellerfamily: INFO
            springframework:
                test: WARN
                core: WARN
                beans: WARN
                data:
                    mongodb:
                        core:
                            index: OFF

endpoints:
    health:
        sensitive: false
        enabled: true
    info:
        sensitive: false
        enabled: true

management:
    port: 8081
    security:
        enabled: false
    server:
        port: 8081
    endpoints:
        web:
            exposure:
                include: health,info,mappings
