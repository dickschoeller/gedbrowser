gedbrowser:
    home: /var/lib/gedbrowser

server:
    servlet:
        context-path: /gedbrowser

logging:
    level:
        org:
            schoellerfamily: INFO
            springframework:
                test: WARN
                core: WARN
                beans: WARN
                data:
                    mongodb:
                        core:
                            index: OFF

spring:
    jackson:
        serialization:
            INDENT_OUTPUT: true

endpoints:
    health:
        sensitive: false
        enabled: true

management:
    server:
        port: 8081
    security:
        enabled: false
    endpoints:
        web:
            exposure:
                include: health,info,restore,mappings
