spring:
    profiles:
        active: test
    main:
        allow-bean-definition-overriding: true
    data:
        mongodb:
            host: localhost
            port: 27017
logging:
    level:
        org:
            schoellerfamily: WARN
            springframework:
                test: WARN
                core: WARN
                beans: WARN
                data:
                    mongodb:
                        core:
                            index: OFF
