@if (href()) {
	<span>
		@if (!image()) {
			<a href="{{ href() }}">{{ displayString() }}</a>
		} @else {
			<div><a href="{{ displayString() }}"><img src="{{ displayString() }}" alt="{{ displayString() }}" width="300px"/></a></div>
		}
	</span>
} @else {
	<span>{{ displayString() }}@if (!last()) { <span>,</span> }</span>
}
