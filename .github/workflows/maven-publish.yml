# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  release:
    types: [created]
  push:
    branches:
      - '**'

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }}/config # location for the settings.xml file

    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: '4.4'

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml -Dskip.integration.tests=true -DskipDocker=true -DskipIT=true

#    - name: Publish to GitHub Packages Apache Maven
#      run: mvn -B deploy -s $GITHUB_WORKSPACE/config/settings.xml -Dskip.integration.tests=true -DskipDocker=true -DskipIT=true -DskipTests=true -Djacoco.skip=true -Dpmd.skip=true -Dcheckstyle.skip=true -Dspotbugs.skip=true -Dcpd.skip=true
